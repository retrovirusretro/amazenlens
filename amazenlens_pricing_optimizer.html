
<style>
  .sec { margin-bottom: 1.75rem; }
  .grid2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-bottom: 1rem; }
  .grid3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1rem; }
  .grid4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1rem; }
  .metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
  .m-lbl { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 3px; }
  .m-val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .m-sub { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px; }
  .divider { height: 0.5px; background: var(--color-border-tertiary); margin: 1.5rem 0; }
  .badge { display:inline-block; font-size:11px; font-weight:500; padding:2px 9px; border-radius:99px; }
  .b-green { background:var(--color-background-success); color:var(--color-text-success); }
  .b-amber { background:var(--color-background-warning); color:var(--color-text-warning); }
  .b-red   { background:var(--color-background-danger);  color:var(--color-text-danger); }
  .b-blue  { background:var(--color-background-info);    color:var(--color-text-info); }
  .b-purple{ background:#EEEDFE; color:#3C3489; }
  .row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .lbl { font-size:13px; color:var(--color-text-secondary); min-width:150px; }
  .tag { font-size:11px; background:var(--color-background-secondary); color:var(--color-text-tertiary); padding:2px 7px; border-radius:4px; }
  .plan-grid { display:grid; grid-template-columns:1.2fr 1fr 1fr 1fr 1fr; gap:6px; font-size:12px; align-items:center; }
  .ph { font-size:11px; color:var(--color-text-tertiary); font-weight:500; padding:4px 0; border-bottom:0.5px solid var(--color-border-secondary); margin-bottom:4px; }
  .pr { padding:7px 0; border-bottom:0.5px solid var(--color-border-tertiary); }
  .arrow { color:var(--color-text-tertiary); font-size:11px; }
  .delta-pos { color:#1D9E75; font-weight:500; }
  .delta-neg { color:#E24B4A; font-weight:500; }
  .scenario-toggle { display:flex; gap:6px; margin-bottom:1rem; }
  .toggle-btn { font-size:12px; padding:5px 12px; border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); cursor:pointer; background:var(--color-background-primary); color:var(--color-text-secondary); }
  .toggle-btn.active { background:var(--color-background-info); color:var(--color-text-info); border-color:transparent; }
</style>

<div style="padding: 1rem 0;">

  <div style="margin-bottom:1.5rem;">
    <div style="font-size:13px;color:var(--color-text-tertiary);margin-bottom:4px;">Fiyatlandırma optimizasyonu · interaktif model</div>
    <div style="font-size:17px;font-weight:500;color:var(--color-text-primary);">Senaryo karşılaştırması: mevcut vs önerilen</div>
  </div>

  <div class="scenario-toggle">
    <button class="toggle-btn active" onclick="setScenario('current')">Mevcut fiyatlar</button>
    <button class="toggle-btn" onclick="setScenario('optimized')">Önerilen fiyatlar</button>
    <button class="toggle-btn" onclick="setScenario('aggressive')">Agresif büyüme</button>
  </div>

  <div id="scenario-desc" class="card" style="margin-bottom:1rem;"></div>

  <div class="grid4" id="top4"></div>

  <div class="divider"></div>

  <div style="font-size:14px;font-weight:500;margin-bottom:1rem;color:var(--color-text-primary);">Plan yapısı karşılaştırması</div>

  <div class="card">
    <div class="plan-grid ph">
      <span>Plan</span><span>Aylık</span><span>Yıllık</span><span>LTV</span><span>Oran</span>
    </div>
    <div id="plan-table"></div>
  </div>

  <div class="divider"></div>

  <div style="font-size:14px;font-weight:500;margin-bottom:1rem;color:var(--color-text-primary);">100 kullanıcıda MRR karşılaştırması</div>
  <div style="position:relative;width:100%;height:200px;margin-bottom:1.5rem;">
    <canvas id="mrrChart"></canvas>
  </div>

  <div class="divider"></div>

  <div style="font-size:14px;font-weight:500;margin-bottom:1rem;color:var(--color-text-primary);">Yıllık plan dönüşüm etkisi</div>

  <div class="row" style="margin-bottom:1rem;">
    <label class="lbl">Yıllık plan tercihi (%)</label>
    <input type="range" min="0" max="80" value="30" step="5" id="annual-slider" style="flex:1;">
    <span style="font-size:13px;font-weight:500;min-width:40px;text-align:right;" id="annual-val">%30</span>
  </div>
  <div class="grid3" id="annual-metrics"></div>

  <div class="divider"></div>

  <div style="font-size:14px;font-weight:500;margin-bottom:1rem;color:var(--color-text-primary);">Expansion revenue: upsell etkisi</div>

  <div class="row" style="margin-bottom:1rem;">
    <label class="lbl">Starter→Pro upsell oranı (%)</label>
    <input type="range" min="0" max="40" value="10" step="5" id="upsell-slider" style="flex:1;">
    <span style="font-size:13px;font-weight:500;min-width:40px;text-align:right;" id="upsell-val">%10</span>
  </div>
  <div class="grid3" id="upsell-metrics"></div>

  <div class="divider"></div>

  <div style="font-size:14px;font-weight:500;margin-bottom:1rem;color:var(--color-text-primary);">5 kritik öneri</div>
  <div id="recommendations"></div>

  <div style="margin-top:1rem;text-align:center;">
    <button onclick="sendPrompt('Yıllık plan kampanyası için hangi onboarding stratejilerini uygulayabiliriz?')" style="font-size:13px;margin-right:8px;">Onboarding stratejisi ↗</button>
    <button onclick="sendPrompt('Starter planı $24\\'e çıkarmanın churn etkisi nasıl minimize edilir?')" style="font-size:13px;">Fiyat artışı planı ↗</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const GM = 0.82;
const CHURN = 0.05;
const CAC = 65;
const MIX = [0.55, 0.35, 0.10];

const SCENARIOS = {
  current: {
    label: 'Mevcut',
    desc: 'Mevcut fiyatlandırma yapısı. $19/$49/$99 — yıllık plan yok.',
    plans: [
      { name:'Starter', mo:19, yr:null,  limit:'50 arama/gün' },
      { name:'Pro',     mo:49, yr:null,  limit:'200 arama/gün' },
      { name:'Agency',  mo:99, yr:null,  limit:'Sınırsız' },
    ]
  },
  optimized: {
    label: 'Önerilen',
    desc: 'Starter $24 (+%26), yıllık plan eklendi (2 ay ücretsiz = %17 indirim). Benchmark: Helium 10 başlangıç $39.',
    plans: [
      { name:'Starter', mo:24, yr:199,  limit:'50 arama/gün' },
      { name:'Pro',     mo:49, yr:399,  limit:'200 arama/gün' },
      { name:'Agency',  mo:129,yr:999,  limit:'Sınırsız + API' },
    ]
  },
  aggressive: {
    label: 'Agresif',
    desc: 'Helium 10 ile doğrudan yarışan fiyat noktaları. Agency $199 + White-label dahil.',
    plans: [
      { name:'Starter', mo:29, yr:239,  limit:'100 arama/gün' },
      { name:'Pro',     mo:69, yr:559,  limit:'500 arama/gün' },
      { name:'Agency',  mo:199,yr:1599, limit:'Sınırsız + API + WL' },
    ]
  }
};

let currentScenario = 'current';
let mrrChart = null;

function arpu(plans) {
  return plans.reduce((s,p,i) => s + p.mo * MIX[i], 0);
}
function ltv(plans) {
  return (arpu(plans) * GM) / CHURN;
}
function mrr100(plans) {
  return plans.reduce((s,p,i) => s + p.mo * MIX[i] * 100, 0);
}
function fmt$(n) { return '$' + Math.round(n).toLocaleString(); }
function fmtR(r) { return r.toFixed(1) + ':1'; }

function setScenario(s) {
  currentScenario = s;
  document.querySelectorAll('.toggle-btn').forEach((b,i) => {
    b.classList.toggle('active', ['current','optimized','aggressive'][i] === s);
  });
  renderAll();
}

function renderAll() {
  const sc = SCENARIOS[currentScenario];
  const plans = sc.plans;
  const curr = SCENARIOS.current.plans;

  document.getElementById('scenario-desc').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <span class="badge ${currentScenario==='current'?'b-blue':currentScenario==='optimized'?'b-green':'b-purple'}">${sc.label}</span>
    </div>
    <div style="font-size:13px;color:var(--color-text-secondary);">${sc.desc}</div>
  `;

  const LTV = ltv(plans);
  const ARPU = arpu(plans);
  const MRR = mrr100(plans);
  const ratio = LTV / CAC;
  const currMRR = mrr100(curr);
  const delta = MRR - currMRR;

  document.getElementById('top4').innerHTML = `
    <div class="metric"><div class="m-lbl">Ağırlıklı ARPU</div><div class="m-val">${fmt$(ARPU)}<span style="font-size:11px;font-weight:400;">/ay</span></div><div class="m-sub">${currentScenario!=='current'?'<span class="delta-pos">+'+(ARPU-arpu(curr)).toFixed(1)+'$</span> mevcut':'Baz senaryo'}</div></div>
    <div class="metric"><div class="m-lbl">LTV</div><div class="m-val">${fmt$(LTV)}</div><div class="m-sub">${currentScenario!=='current'?'<span class="delta-pos">+'+fmt$(LTV-ltv(curr))+'</span>':'Baz senaryo'}</div></div>
    <div class="metric"><div class="m-lbl">LTV:CAC</div><div class="m-val">${fmtR(ratio)}</div><div class="m-sub">${ratio>=5?'<span class="badge b-green">Mükemmel</span>':ratio>=3?'<span class="badge b-blue">Sağlıklı</span>':'<span class="badge b-amber">Dikkat</span>'}</div></div>
    <div class="metric"><div class="m-lbl">MRR (100 kullanıcı)</div><div class="m-val">${fmt$(MRR)}</div><div class="m-sub">${currentScenario!=='current'?'<span class="delta-pos">+'+fmt$(delta)+'/ay</span>':'Baz senaryo'}</div></div>
  `;

  document.getElementById('plan-table').innerHTML = plans.map((p,i) => {
    const pLTV = (p.mo * GM) / CHURN;
    const r = pLTV / CAC;
    const prevMo = curr[i].mo;
    const delta = p.mo - prevMo;
    const dStr = delta > 0 ? `<span class="delta-pos">+$${delta}</span>` : delta < 0 ? `<span class="delta-neg">$${delta}</span>` : '<span class="arrow">—</span>';
    return `<div class="plan-grid pr">
      <span style="font-weight:500;color:var(--color-text-primary);">${p.name}<br><span class="tag">${p.limit}</span></span>
      <span>${fmt$(p.mo)} ${dStr}</span>
      <span style="color:var(--color-text-secondary);">${p.yr ? fmt$(p.yr) : '<span style="color:var(--color-text-tertiary);">—</span>'}</span>
      <span style="font-weight:500;">${fmt$(pLTV)}</span>
      <span><span class="badge ${r>=5?'b-green':r>=3?'b-blue':'b-amber'}">${fmtR(r)}</span></span>
    </div>`;
  }).join('');

  updateChart(plans);
  updateAnnual();
  updateUpsell();
  renderRecs();
}

function updateChart(plans) {
  const labels = ['Starter\n55%', 'Pro\n35%', 'Agency\n10%', 'Toplam'];
  const currMRR = SCENARIOS.current.plans.map((p,i) => Math.round(p.mo * MIX[i] * 100));
  currMRR.push(currMRR.reduce((a,b)=>a+b,0));
  const newMRR = plans.map((p,i) => Math.round(p.mo * MIX[i] * 100));
  newMRR.push(newMRR.reduce((a,b)=>a+b,0));

  if (mrrChart) { mrrChart.destroy(); mrrChart = null; }
  const ctx = document.getElementById('mrrChart').getContext('2d');
  mrrChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Mevcut', data:currMRR, backgroundColor:'#378ADD33', borderColor:'#378ADD', borderWidth:1.5, borderRadius:4 },
        { label:SCENARIOS[currentScenario].label, data:newMRR, backgroundColor:'#1D9E7533', borderColor:'#1D9E75', borderWidth:1.5, borderRadius:4 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: ctx => ' '+ctx.dataset.label+': $'+ctx.parsed.y.toLocaleString() } } },
      scales:{
        y:{ beginAtZero:true, ticks:{ callback:v=>'$'+v.toLocaleString(), font:{size:11} }, grid:{color:'rgba(0,0,0,0.05)'} },
        x:{ ticks:{font:{size:11}}, grid:{display:false} }
      }
    }
  });
}

function updateAnnual() {
  const annualPct = parseInt(document.getElementById('annual-slider').value);
  document.getElementById('annual-val').textContent = '%' + annualPct;
  const plans = SCENARIOS[currentScenario].plans;
  const moPct = 1 - annualPct/100;
  const yrPct = annualPct/100;
  let blendedMRR = 0;
  plans.forEach((p,i) => {
    const moRevMRR = p.mo * MIX[i] * moPct;
    const yrRevMRR = p.yr ? (p.yr/12) * MIX[i] * yrPct : p.mo * MIX[i] * yrPct;
    blendedMRR += (moRevMRR + yrRevMRR);
  });
  blendedMRR *= 100;
  const churnReduction = annualPct > 0 ? Math.max(0, CHURN - (annualPct/100) * 0.025) : CHURN;
  const newLTV = (arpu(plans) * GM) / churnReduction;
  const baseMRR = mrr100(plans);
  document.getElementById('annual-metrics').innerHTML = `
    <div class="metric"><div class="m-lbl">Düzeltilmiş MRR</div><div class="m-val">${fmt$(blendedMRR)}</div><div class="m-sub">${blendedMRR>=baseMRR?'<span class="delta-pos">+'+fmt$(blendedMRR-baseMRR)+'</span>':'<span class="delta-neg">'+fmt$(blendedMRR-baseMRR)+'</span>'}</div></div>
    <div class="metric"><div class="m-lbl">Efektif churn</div><div class="m-val">%${(churnReduction*100).toFixed(1)}</div><div class="m-sub">Yıllık taahhüt churn'ü düşürür</div></div>
    <div class="metric"><div class="m-lbl">Düzeltilmiş LTV</div><div class="m-val">${fmt$(newLTV)}</div><div class="m-sub"><span class="delta-pos">+${fmt$(newLTV-ltv(plans))}</span> kazanç</div></div>
  `;
}

function updateUpsell() {
  const upsellPct = parseInt(document.getElementById('upsell-slider').value);
  document.getElementById('upsell-val').textContent = '%' + upsellPct;
  const plans = SCENARIOS[currentScenario].plans;
  const starterPro = upsellPct/100;
  const newMix = [MIX[0]*(1-starterPro), MIX[1]+MIX[0]*starterPro, MIX[2]];
  const newARPU = plans.reduce((s,p,i) => s + p.mo * newMix[i], 0);
  const newLTV = (newARPU * GM) / CHURN;
  const newMRR = plans.reduce((s,p,i) => s + p.mo * newMix[i] * 100, 0);
  const baseMRR = mrr100(plans);
  const cacNoNew = 8;
  document.getElementById('upsell-metrics').innerHTML = `
    <div class="metric"><div class="m-lbl">Yeni ARPU</div><div class="m-val">${fmt$(newARPU)}</div><div class="m-sub"><span class="delta-pos">+${(newARPU-arpu(plans)).toFixed(1)}$</span> expansion</div></div>
    <div class="metric"><div class="m-lbl">Yeni MRR</div><div class="m-val">${fmt$(newMRR)}</div><div class="m-sub"><span class="delta-pos">+${fmt$(newMRR-baseMRR)}</span>/ay</div></div>
    <div class="metric"><div class="m-lbl">Upsell LTV</div><div class="m-val">${fmt$(newLTV)}</div><div class="m-sub">CAC ~$${cacNoNew} (mevcut müşteri)</div></div>
  `;
}

function renderRecs() {
  const sc = currentScenario;
  const recs = [
    {
      num:'1', color:'#E24B4A',
      title: 'Starter $19 → $24: en yüksek öncelik',
      body: sc==='current'
        ? 'Helium 10 başlangıç planı $39. $24, hem rakipten ucuz hem de MRR\'yi %26 artırır. Türk kullanıcı için TL ile fiyatlandırmayı değerlendirin: 799₺/ay.'
        : 'Bu senaryo Starter için $24 içeriyor. Fiyat artışını mevcut ücretsiz kullanıcılara 30 günlük ücretsiz Pro erişimle telafi edin.',
      badge: 'Hemen'
    },
    {
      num:'2', color:'#1D9E75',
      title: 'Yıllık plan: churn\'ü %40-50 düşürür',
      body: '2 ay ücretsiz formülü basit ve ikna edici. Yıllık ödeme alan müşteri churn oranı aylık ödeyene göre çok daha düşük. Onboarding sırasında "yıllık al, 2 ay kazan" banner\'ı ekleyin.',
      badge: 'Bu ay'
    },
    {
      num:'3', color:'#534AB7',
      title: 'Agency $99 → $129: düşük direnç, yüksek kazanım',
      body: 'Ajans segmenti fiyata en az duyarlı kullanıcı grubu. $30 artış onlar için marginal, sizin için +$900 LTV farkı. Karşılığında 1 özellik ekleyin: API erişimi veya müşteri raporu.',
      badge: 'Bu ay'
    },
    {
      num:'4', color:'#BA7517',
      title: 'Upsell akışı: en ucuz büyüme yolu',
      body: 'Mevcut müşteriye upsell CAC\'ı ~$8 (yeni müşteri $65). Starter\'dan Pro\'ya geçişi tetikleyen 3 moment: limit dolduğunda, 3. nişi analiz edince, 14. günde. Her biri için spesifik mesaj tasarlayın.',
      badge: '2 hafta'
    },
    {
      num:'5', color:'#0F6E56',
      title: 'Free plan → freemium değil, trial',
      body: 'Mevcut 5 arama/gün free plan ürünü anlatmaya yetmiyor. 14 günlük Pro deneme (limit yok) → sonra Starter\'a geç stratejisi dönüşümü 3x artırır. Helium 10 ve Jungle Scout\'un standart modeli bu.',
      badge: 'Lansman sonrası'
    },
  ];
  document.getElementById('recommendations').innerHTML = recs.map(r =>
    `<div style="display:flex;gap:12px;padding:12px 0;border-bottom:0.5px solid var(--color-border-tertiary);">
      <div style="width:24px;height:24px;border-radius:50%;background:${r.color}22;border:0.5px solid ${r.color}44;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:500;color:${r.color};">${r.num}</div>
      <div style="flex:1;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <span style="font-size:13px;font-weight:500;color:var(--color-text-primary);">${r.title}</span>
          <span class="tag">${r.badge}</span>
        </div>
        <div style="font-size:12px;color:var(--color-text-secondary);line-height:1.6;">${r.body}</div>
      </div>
    </div>`
  ).join('');
}

document.getElementById('annual-slider').addEventListener('input', updateAnnual);
document.getElementById('upsell-slider').addEventListener('input', updateUpsell);
renderAll();
</script>
